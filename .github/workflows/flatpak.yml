name: Flatpak Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  flatpak:
    name: Flatpak Build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged
    outputs:
      bundle: GameConsoleFeed.flatpak
    steps:
      - uses: actions/checkout@v6

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: GameConsoleFeed.flatpak
          manifest-path: io.github.merklejerk.GameConsoleFeed.yaml
          cache-key: flatpak-builder-${{ github.sha }}

      - uses: actions/upload-artifact@v4
        with:
          name: flatpak-bundle
          path: GameConsoleFeed.flatpak

  release:
    name: Create Dev Release
    runs-on: ubuntu-latest
    needs: flatpak
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: flatpak-bundle

      - name: Update Dev Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: "GameConsoleFeed.flatpak"
          body: "Rolling development build. This release is automatically updated on every push to main."
          name: "Development Build"
          tag: dev
          prerelease: true
